<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spydee — Personal Intelligence System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --cyan: #00f5ff;
    --cyan-dim: rgba(0,245,255,0.15);
    --cyan-glow: rgba(0,245,255,0.4);
    --dark: #040814;
    --panel: rgba(6,18,42,0.85);
    --border: rgba(0,245,255,0.18);
    --text: #c8e8ff;
    --muted: rgba(200,232,255,0.45);
    --success: #00ff88;
    --warn: #ffaa00;
    --danger: #ff4466;
    --gold: #ffd700;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--dark); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events:none; z-index:0;
  }

  .app { position:relative; z-index:1; max-width:920px; margin:0 auto; padding:24px 20px 80px; }

  header { text-align:center; padding:28px 0 22px; }
  .clock { font-family:'Orbitron',monospace; font-size:2.8rem; font-weight:700; color:var(--cyan); text-shadow:0 0 24px var(--cyan-glow); letter-spacing:0.06em; }
  .date-str { font-size:0.65rem; color:var(--muted); letter-spacing:0.22em; margin-top:4px; }

  .logo-ring { width:96px; height:96px; margin:12px auto 14px; position:relative; display:flex; align-items:center; justify-content:center; }
  .logo-ring svg { position:absolute; inset:0; }
  .logo-ring .spin1 { animation:spin 10s linear infinite; }
  .logo-icon { font-family:'Orbitron',monospace; font-weight:900; font-size:26px; color:var(--cyan); text-shadow:0 0 24px var(--cyan-glow); position:relative; z-index:2; }
  @keyframes spin { to { transform:rotate(360deg); } }

  h1 { font-family:'Orbitron',monospace; font-size:2.4rem; font-weight:900; letter-spacing:0.14em; color:var(--cyan); text-shadow:0 0 32px var(--cyan-glow); }

  .status-bar { display:flex; align-items:center; justify-content:center; gap:18px; margin:18px 0 22px; flex-wrap:wrap; }
  .status-dot { display:flex; align-items:center; gap:7px; font-size:0.63rem; color:var(--muted); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); }
  .dot.on { background:var(--success); box-shadow:0 0 8px var(--success); }

  .voice-panel {
    background:var(--panel); border:1px solid var(--border);
    border-radius:16px; padding:24px; margin-bottom:16px;
    backdrop-filter:blur(12px); position:relative; overflow:hidden;
  }

  .spydee-response {
    font-family:'Orbitron',monospace; font-size:0.86rem; color:var(--cyan);
    text-align:center; min-height:28px; letter-spacing:0.04em;
    text-shadow:0 0 12px var(--cyan-glow); line-height:1.55;
  }

  .wake-btn {
    display:flex; align-items:center; gap:10px; margin:13px auto 0; width:fit-content;
    background:var(--cyan-dim); border:1px solid var(--cyan); border-radius:40px;
    padding:9px 20px; font-family:'Orbitron',monospace; font-size:0.68rem;
    color:var(--cyan); cursor:pointer; transition:all 0.2s;
  }

  .convo-panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px 20px; margin-bottom:16px; max-height:260px; overflow-y:auto; }
  .convo-who.user { color:var(--warn); font-family: 'Orbitron'; font-size: 0.6rem; }
  .convo-who.spydee { color:var(--cyan); font-family: 'Orbitron'; font-size: 0.6rem; }
  .convo-text { font-size:0.74rem; color:var(--text); margin-bottom: 10px; padding-left: 10px; border-left: 1px solid var(--border); }

  .input-panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px 20px; margin-bottom:16px; }
  .task-input { width: 100%; background:rgba(0,245,255,0.04); border:1px solid var(--border); border-radius:10px; padding:10px; color:var(--text); font-family:'Space Mono'; resize:none; outline:none; }
  .submit-btn { background:var(--cyan-dim); border:1px solid var(--cyan); border-radius:10px; padding:10px 15px; color:var(--cyan); cursor:pointer; margin-top: 10px; }

  .tasks-panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px 20px; }
  .task-card { background:rgba(0,245,255,0.03); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom: 10px; border-left: 3px solid var(--cyan); }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="clock" id="clock">00:00:00</div>
    <div class="date-str" id="date-str">LOADING...</div>
    <div class="logo-ring">
      <svg class="spin1" viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="44" stroke="var(--cyan)" stroke-width="1" stroke-dasharray="5 7"/></svg>
      <div class="logo-icon">S</div>
    </div>
    <h1>SPYDEE</h1>
  </header>

  <div class="status-bar">
    <div class="status-dot"><div class="dot on"></div>SYSTEMS NOMINAL</div>
    <div class="status-dot"><div class="dot" id="mic-dot"></div><span id="mic-status">MIC STANDBY</span></div>
  </div>

  <div class="voice-panel">
    <div class="spydee-response" id="spydee-response">AUTHORIZATION REQUIRED</div>
    <button class="wake-btn" id="init-btn" onclick="bootSystem()">
      <span>🎙</span><span id="btn-label">INITIALIZE INTERFACE</span>
    </button>
  </div>

  <div class="convo-panel" id="convo-list"></div>

  <div class="input-panel">
    <textarea class="task-input" id="task-input" placeholder="Enter command for Spydee..." rows="2"></textarea>
    <button class="submit-btn" onclick="processText()">EXECUTE COMMAND</button>
  </div>

  <div class="tasks-panel">
    <div id="task-list"></div>
  </div>
</div>

<script>
'use strict';

const synth = window.speechSynthesis;
let tasks = JSON.parse(localStorage.getItem('spydee_tasks_v3') || '[]');
let recognition = null;

// PRONUNCIATION ENGINE
const DISPLAY_USER = "Spydarr";
const PHONETIC_USER = "Spider";
const DISPLAY_SELF = "Spydee";
const PHONETIC_SELF = "Spidee";

function bootSystem() {
  const intro = `Systems online. I am ${PHONETIC_SELF}. How may I assist you today, ${PHONETIC_USER}?`;
  speak(intro);
  
  document.getElementById('spydee-response').textContent = `WELCOME BACK, ${DISPLAY_USER}`;
  document.getElementById('btn-label').textContent = "LISTENING...";
  document.getElementById('mic-dot').className = "dot on";
  
  startListening();
}

function speak(text) {
  synth.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  
  // Try to find a high-quality British voice for Jarvis
  const voices = synth.getVoices();
  utterance.voice = voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v.lang === 'en-GB') || voices[0];
  
  utterance.rate = 0.95;
  utterance.pitch = 0.85; 
  utterance.volume = 1.0;
  
  synth.speak(utterance);
}

function startListening() {
  const SpeechR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechR) return;

  recognition = new SpeechR();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
    handleInput(transcript);
  };

  recognition.start();
}

async function handleInput(input) {
  addConvo(DISPLAY_USER, input);
  
  let replyText = "";
  let phoneticReply = "";

  if (input.includes("remind") || input.includes("task")) {
    const taskText = input.replace(/remind me to|task/i, "").trim();
    tasks.push({ id: Date.now(), text: taskText });
    localStorage.setItem('spydee_tasks_v3', JSON.stringify(tasks));
    renderTasks();
    
    replyText = `Certainly, ${DISPLAY_USER}. Task added to the log.`;
    phoneticReply = `Certainly, ${PHONETIC_USER}. Task added to the log.`;
  } else {
    replyText = `Processing request, ${DISPLAY_USER}. I'm afraid I'm still calibrating my logic cores for that.`;
    phoneticReply = `Processing request, ${PHONETIC_USER}. I'm afraid I'm still calibrating my logic cores for that.`;
  }

  document.getElementById('spydee-response').textContent = replyText.toUpperCase();
  addConvo(DISPLAY_SELF, replyText);
  speak(phoneticReply);
}

function addConvo(who, text) {
  const list = document.getElementById('convo-list');
  const msg = document.createElement('div');
  msg.innerHTML = `<div class="convo-who ${who.toLowerCase()}">${who.toUpperCase()}</div><div class="convo-text">${text}</div>`;
  list.prepend(msg);
}

function renderTasks() {
  const list = document.getElementById('task-list');
  list.innerHTML = tasks.map(t => `<div class="task-card">${t.text}</div>`).join('');
}

function processText() {
  const input = document.getElementById('task-input').value;
  if(input) {
    handleInput(input);
    document.getElementById('task-input').value = "";
  }
}

// Clock logic
setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
  document.getElementById('date-str').textContent = now.toDateString().toUpperCase();
}, 1000);

renderTasks();
</script>
</body>
</html>
