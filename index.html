<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spydee — Personal Intelligence System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --cyan: #00f5ff;
    --cyan-dim: rgba(0,245,255,0.15);
    --cyan-glow: rgba(0,245,255,0.4);
    --dark: #040814;
    --panel: rgba(6,18,42,0.85);
    --border: rgba(0,245,255,0.18);
    --text: #c8e8ff;
    --muted: rgba(200,232,255,0.45);
    --success: #00ff88;
    --warn: #ffaa00;
    --danger: #ff4466;
    --gold: #ffd700;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--dark); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events:none; z-index:0;
  }

  .app { position:relative; z-index:1; max-width:920px; margin:0 auto; padding:24px 20px 80px; }

  header { text-align:center; padding:28px 0 22px; }
  .clock { font-family:'Orbitron',monospace; font-size:2.8rem; font-weight:700; color:var(--cyan); text-shadow:0 0 24px var(--cyan-glow); letter-spacing:0.06em; }
  .date-str { font-size:0.65rem; color:var(--muted); letter-spacing:0.22em; margin-top:4px; }

  .logo-ring { width:96px; height:96px; margin:12px auto 14px; position:relative; display:flex; align-items:center; justify-content:center; }
  .logo-ring svg { position:absolute; inset:0; }
  .logo-ring .spin1 { animation:spin 10s linear infinite; }
  .logo-icon { font-family:'Orbitron',monospace; font-weight:900; font-size:26px; color:var(--cyan); text-shadow:0 0 24px var(--cyan-glow); position:relative; z-index:2; }

  h1 { font-family:'Orbitron',monospace; font-size:2.4rem; font-weight:900; letter-spacing:0.14em; color:var(--cyan); text-shadow:0 0 32px var(--cyan-glow); }
  
  .browser-badge {
    display:inline-flex; align-items:center; gap:7px; margin-top:12px;
    font-family:'Orbitron',monospace; font-size:0.58rem; letter-spacing:0.12em;
    padding:5px 14px; border-radius:20px; border:1px solid;
  }
  .browser-badge.native  { color:var(--success); border-color:rgba(0,255,136,0.3); background:rgba(0,255,136,0.06); }

  .status-bar { display:flex; align-items:center; justify-content:center; gap:18px; margin:18px 0 22px; flex-wrap:wrap; }
  .status-dot { display:flex; align-items:center; gap:7px; font-size:0.63rem; color:var(--muted); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); }
  .dot.on { background:var(--success); box-shadow:0 0 8px var(--success); }

  .voice-panel {
    background:var(--panel); border:1px solid var(--border);
    border-radius:16px; padding:24px; margin-bottom:16px;
    backdrop-filter:blur(12px); text-align: center;
  }

  .voice-visualizer { display:flex; align-items:flex-end; justify-content:center; gap:3px; height:52px; margin:13px 0; }
  .bar { width:4px; background:var(--cyan); border-radius:2px; height:4px; transition:height 0.1s; }
  
  .spydee-response {
    font-family:'Orbitron',monospace; font-size:0.86rem; color:var(--cyan);
    min-height:28px; letter-spacing:0.04em; line-height:1.55;
  }

  .wake-btn {
    display:flex; align-items:center; gap:10px; margin:20px auto 0;
    background:var(--cyan-dim); border:1px solid var(--cyan); border-radius:40px;
    padding:12px 25px; font-family:'Orbitron',monospace; color:var(--cyan); cursor:pointer;
  }

  .convo-panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:16px; max-height:200px; overflow-y:auto; }
  .convo-msg { margin-bottom:10px; font-size:0.75rem; }
  .convo-who.user { color:var(--warn); }
  .convo-who.spydee { color:var(--cyan); }

  .input-panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:15px; margin-bottom:16px; }
  .task-input { width:100%; background:rgba(0,245,255,0.05); border:1px solid var(--border); border-radius:8px; color:white; padding:10px; font-family:inherit; }
  
  .tasks-panel { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px; }
  .task-card { background:rgba(0,245,255,0.05); margin-bottom:8px; padding:10px; border-radius:8px; border-left:3px solid var(--cyan); display:flex; justify-content:space-between; }
  
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="clock" id="clock">00:00:00</div>
    <div class="date-str" id="date-str">LOADING...</div>
    <div class="logo-ring">
        <svg class="spin1" viewBox="0 0 96 96"><circle cx="48" cy="48" r="40" stroke="var(--cyan)" stroke-width="1" fill="none" stroke-dasharray="10 5"/></svg>
        <div class="logo-icon">S</div>
    </div>
    <h1>SPYDEE</h1>
    <div id="browser-badge" class="browser-badge native">SYSTEM READY</div>
  </header>

  <div class="status-bar">
    <div class="status-dot"><div class="dot on"></div>SYSTEMS NOMINAL</div>
    <div class="status-dot"><div class="dot" id="mic-dot"></div><span id="mic-status">MIC STANDBY</span></div>
  </div>

  <div class="voice-panel">
    <div class="voice-visualizer" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="spydee-response" id="spydee-response">AWAITING AUTHORIZATION...</div>
    <button class="wake-btn" id="wake-btn" onclick="initSystem()">
      <span id="wake-btn-label">INITIALIZE SPYDEE</span>
    </button>
  </div>

  <div class="convo-panel" id="convo-list"></div>

  <div class="input-panel">
    <textarea class="task-input" id="task-input" placeholder="Type a command..."></textarea>
    <button class="wake-btn" style="margin-top:10px" onclick="processTextInput()">EXECUTE</button>
  </div>

  <div class="tasks-panel">
    <div id="task-list"></div>
  </div>
</div>

<script>
'use strict';

// PRONUNCIATION CONSTANTS
const USER_NAME_PHONETIC = "Spydarr"; // Becomes "Spider" in Speech
const SYSTEM_NAME_PHONETIC = "Spydee"; // Becomes "Spidee" in Speech

let tasks = JSON.parse(localStorage.getItem('spydee_tasks_v3') || '[]');
let groqKey = localStorage.getItem('spydee_groq_key') || '';
let recognition = null;
let isListening = false;
const synth = window.speechSynthesis;

// 1. INITIALIZE SYSTEM (Required for Safari/iOS to unlock audio)
function initSystem() {
  const u = new SpeechSynthesisUtterance("System initialized. I am online, " + USER_NAME_PHONETIC);
  u.rate = 0.9;
  u.pitch = 0.8;
  synth.speak(u);
  
  document.getElementById('wake-btn-label').textContent = "SYSTEM ACTIVE";
  document.getElementById('spydee-response').textContent = "ONLINE. HOW CAN I HELP, " + USER_NAME_PHONETIC.toUpperCase() + "?";
  
  setupRecognition();
}

// 2. JARVIS STYLE SPEECH
function speak(text) {
  if (!text) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  // Safari chooses default voices; we set pitch/rate for the Jarvis vibe
  u.rate = 0.9; 
  u.pitch = 0.8; 
  u.volume = 1.0;
  
  u.onstart = () => animateBars(true);
  u.onend = () => animateBars(false);
  synth.speak(u);
}

function animateBars(active) {
    const bars = document.querySelectorAll('.bar');
    bars.forEach(b => {
        b.style.height = active ? (Math.random() * 40 + 10) + 'px' : '4px';
    });
    if(active) setTimeout(() => animateBars(true), 150);
}

// 3. RECOGNITION SETUP
function setupRecognition() {
  const SpeechR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechR) {
    alert("Speech recognition not supported on this browser.");
    return;
  }
  
  recognition = new SpeechR();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    document.getElementById('mic-dot').classList.add('on');
    document.getElementById('mic-status').textContent = "LISTENING";
  };

  recognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
    handleCommand(transcript);
  };

  recognition.start();
}

// 4. COMMAND LOGIC
async function handleCommand(input) {
  addConvo('user', input);
  
  let response = "";
  
  if (input.includes("remind") || input.includes("task")) {
    const task = { id: Date.now(), text: input, done: false, time: new Date() };
    tasks.push(task);
    localStorage.setItem('spydee_tasks_v3', JSON.stringify(tasks));
    renderTasks();
    response = `Of course, ${USER_NAME_PHONETIC}. I've added that to your primary queue.`;
  } else {
    response = `Certainly, ${USER_NAME_PHONETIC}. Processing your request for: ${input}.`;
  }

  document.getElementById('spydee-response').textContent = response.toUpperCase();
  addConvo('spydee', response);
  speak(response);
}

function addConvo(who, text) {
  const list = document.getElementById('convo-list');
  const div = document.createElement('div');
  div.className = `convo-msg`;
  div.innerHTML = `<span class="convo-who ${who}">${who === 'user' ? 'YOU' : 'SPYDEE'}:</span> ${text}`;
  list.prepend(div);
}

function renderTasks() {
  const list = document.getElementById('task-list');
  list.innerHTML = tasks.map(t => `
    <div class="task-card">
      <span>${t.text}</span>
      <button onclick="deleteTask(${t.id})" style="background:none; border:none; color:red;">X</button>
    </div>
  `).join('');
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem('spydee_tasks_v3', JSON.stringify(tasks));
  renderTasks();
}

function processTextInput() {
    const input = document.getElementById('task-input').value;
    if(input) {
        handleCommand(input);
        document.getElementById('task-input').value = "";
    }
}

// 5. CLOCK
setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString();
  document.getElementById('date-str').textContent = now.toDateString().toUpperCase();
}, 1000);

renderTasks();
</script>
</body>
</html>
